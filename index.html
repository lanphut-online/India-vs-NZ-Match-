<!DOCTYPE html>
<html>
<head>
<title>India vs New Zealand Vote</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:20px;
}

.card{
background:white;
padding:20px;
max-width:350px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
padding:10px;
width:90%;
margin:10px 0;
}

button{
padding:12px 20px;
margin:6px;
border:none;
border-radius:6px;
cursor:pointer;
}

.india{background:#138808;color:white;}
.nz{background:black;color:white;}
.share{background:#25D366;color:white;}
.admin{background:#444;color:white;}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
}

th,td{
padding:10px;
border:1px solid #ccc;
}

th{
background:#333;
color:white;
}

</style>

</head>

<body>

<h2>🏏 Surprise Vote</h2>
<h3>🇮🇳 India vs 🇳🇿 New Zealand</h3>

<div class="card">

<input type="text" id="name" placeholder="Enter your name">

<br>

<button class="india" onclick="vote('India')">Vote India</button>

<button class="nz" onclick="vote('New Zealand')">Vote New Zealand</button>

<br>

<button class="share" onclick="shareWhatsApp()">📲 Share Vote Link</button>

<br>

<button class="admin" onclick="showLogin()">🔐 Admin Login</button>

<p id="msg"></p>

</div>

<!-- ADMIN LOGIN -->

<div id="loginBox" style="display:none">

<h3>Admin Login</h3>

<input type="password" id="pass" placeholder="Enter password">

<br>

<button onclick="login()">Login</button>

</div>

<!-- ADMIN PANEL -->

<div id="adminPanel" style="display:none">

<h2>📊 Voting List</h2>

<table>

<tr>
<th>Name</th>
<th>Team</th>
<th>Time</th>
</tr>

<tbody id="voteTable"></tbody>

</table>

</div>

<script>

function vote(team){

let name=document.getElementById("name").value;

if(name===""){
alert("Please enter your name");
return;
}

let votes=JSON.parse(localStorage.getItem("votes")) || [];

votes.push({
name:name,
team:team,
time:new Date().toLocaleString()
});

localStorage.setItem("votes",JSON.stringify(votes));

document.getElementById("msg").innerHTML="✅ Vote submitted!";

document.getElementById("name").value="";

}

function shareWhatsApp(){

let voteLink="https://lanphut-online.github.io/India-vs-NZ-Match-/";

let message="🏏 Surprise Vote!\n\nWho will win?\n🇮🇳 India vs 🇳🇿 New Zealand\n\nVote here:\n"+voteLink;

let url="https://wa.me/?text="+encodeURIComponent(message);

window.open(url,"_blank");

}

function showLogin(){

document.getElementById("loginBox").style.display="block";

}

function login(){

let pass=document.getElementById("pass").value;

if(pass==="admin123"){

document.getElementById("adminPanel").style.display="block";

loadVotes();

}else{

alert("Wrong password");

}

}

function loadVotes(){

let votes=JSON.parse(localStorage.getItem("votes")) || [];

let table=document.getElementById("voteTable");

table.innerHTML="";

votes.forEach(v=>{

table.innerHTML+=`
<tr>
<td>${v.name}</td>
<td>${v.team}</td>
<td>${v.time}</td>
</tr>
`;

});

}

</script>

</body>
</html>
