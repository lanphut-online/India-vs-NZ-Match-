<!DOCTYPE html>
<html>
<head>
<title>India vs New Zealand Vote</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:20px;
}

.card{
background:white;
padding:20px;
max-width:350px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
padding:10px;
width:90%;
margin:10px 0;
}

button{
padding:12px 20px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
}

.india{
background:#138808;
color:white;
}

.nz{
background:black;
color:white;
}

.share{
background:#25D366;
color:white;
width:90%;
}

</style>

</head>

<body>

<h2>🏏 Surprise Vote</h2>
<h3>🇮🇳 India vs 🇳🇿 New Zealand</h3>

<div class="card">

<input type="text" id="name" placeholder="Enter your name">

<br>

<button class="india" onclick="vote('India')">Vote 🇮🇳 India</button>

<button class="nz" onclick="vote('New Zealand')">Vote 🇳🇿 New Zealand</button>

<br><br>

<button class="share" onclick="shareWhatsApp()">📲 Share Vote Link</button>

<p id="msg"></p>

</div>

<script>

function vote(team){

var name = document.getElementById("name").value;

if(name===""){
alert("Please enter your name");
return;
}

var votes = JSON.parse(localStorage.getItem("votes")) || [];

votes.push({
name:name,
team:team,
time:new Date().toLocaleString()
});

localStorage.setItem("votes", JSON.stringify(votes));

document.getElementById("msg").innerHTML="✅ Vote submitted!";

document.getElementById("name").value="";

}

function shareWhatsApp(){

var link="https://lanphut-online.github.io/India-vs-NZ-Match-/";

var message="🏏 Surprise Vote!\n\nWho will win?\n🇮🇳 India vs 🇳🇿 New Zealand\n\nVote here:\n"+link;

var url="https://wa.me/?text="+encodeURIComponent(message);

window.open(url,"_blank");

}

</script>

</body>
</html>
